<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#37474f"/>
  <!-- Vault wall -->
  <rect x="0" y="0" width="200" height="200" fill="#546e7a"/>
  <!-- Vault door (circle) -->
  <circle cx="100" cy="95" r="65" fill="#bdbdbd" stroke="#212121" stroke-width="3"/>
  <circle cx="100" cy="95" r="50" fill="#9e9e9e" stroke="#212121" stroke-width="2"/>
  <!-- Vault wheel -->
  <circle cx="100" cy="95" r="14" fill="#616161" stroke="#212121" stroke-width="2"/>
  <line x1="100" y1="78" x2="100" y2="112" stroke="#212121" stroke-width="3"/>
  <line x1="83" y1="95" x2="117" y2="95" stroke="#212121" stroke-width="3"/>
  <line x1="88" y1="83" x2="112" y2="107" stroke="#212121" stroke-width="3"/>
  <line x1="112" y1="83" x2="88" y2="107" stroke="#212121" stroke-width="3"/>
  <!-- Henry stick figure -->
  <g stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="40" cy="60" r="9" fill="#fff8e1"/>
    <line x1="40" y1="69" x2="40" y2="100"/>
    <line x1="40" y1="100" x2="30" y2="125"/>
    <line x1="40" y1="100" x2="50" y2="125"/>
    <line x1="40" y1="80" x2="22" y2="92"/>
    <line x1="40" y1="80" x2="58" y2="95"/>
  </g>
  <!-- Money bag -->
  <g transform="translate(60 90)">
    <ellipse cx="0" cy="5" rx="14" ry="16" fill="#a1887f" stroke="#3e2723" stroke-width="1.5"/>
    <line x1="-9" y1="-9" x2="9" y2="-9" stroke="#3e2723" stroke-width="2"/>
    <text x="0" y="9" text-anchor="middle" fill="#fdd835" font-family="Arial Black" font-size="13" font-weight="900" stroke="#3e2723" stroke-width="0.5">$</text>
  </g>
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" fill="#fdd835" font-family="Arial Black" font-size="11" font-weight="900" stroke="#212121" stroke-width="0.5">HENRY STICKMIN</text>
  <text x="100" y="195" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="11" font-weight="900">BREAKING THE BANK</text>
</svg>
