<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="po-bluep" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.4" stop-color="#29b6f6"/>
      <stop offset="1" stop-color="#01579b"/>
    </radialGradient>
    <radialGradient id="po-orgp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.4" stop-color="#ff9800"/>
      <stop offset="1" stop-color="#bf360c"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#212121"/>
  <!-- Grid floor -->
  <g stroke="#37474f" stroke-width="1" opacity="0.5">
    <line x1="0" y1="160" x2="200" y2="160"/>
    <line x1="0" y1="180" x2="200" y2="180"/>
    <line x1="50" y1="155" x2="30" y2="200"/>
    <line x1="100" y1="155" x2="100" y2="200"/>
    <line x1="150" y1="155" x2="170" y2="200"/>
  </g>
  <!-- Blue portal -->
  <ellipse cx="60" cy="100" rx="32" ry="50" fill="url(#po-bluep)"/>
  <ellipse cx="60" cy="100" rx="22" ry="40" fill="#0d47a1"/>
  <ellipse cx="60" cy="100" rx="14" ry="28" fill="#01579b"/>
  <!-- Orange portal -->
  <ellipse cx="140" cy="100" rx="32" ry="50" fill="url(#po-orgp)"/>
  <ellipse cx="140" cy="100" rx="22" ry="40" fill="#bf360c"/>
  <ellipse cx="140" cy="100" rx="14" ry="28" fill="#3e2723"/>
  <!-- Companion cube -->
  <g transform="translate(86 90)">
    <rect width="28" height="28" fill="#9e9e9e" stroke="#212121" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="4" fill="#fff"/>
    <path d="M 14 9 L 17 14 L 14 19 L 11 14 Z" fill="#e91e63"/>
  </g>
  <!-- Title -->
  <text x="100" y="185" text-anchor="middle" fill="#ff9800" font-family="Arial Black" font-size="22" font-weight="900" stroke="#fff" stroke-width="0.5">PORTAL</text>
</svg>
