<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ctr-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8d6e63"/>
      <stop offset="1" stop-color="#5d4037"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#ctr-bg)"/>
  <!-- Rope -->
  <line x1="100" y1="0" x2="100" y2="80" stroke="#a1887f" stroke-width="3"/>
  <!-- Star background dots -->
  <g opacity="0.4">
    <circle cx="40" cy="30" r="2" fill="#fdd835"/>
    <circle cx="160" cy="40" r="2" fill="#fdd835"/>
    <circle cx="30" cy="80" r="2" fill="#fdd835"/>
    <circle cx="170" cy="100" r="2" fill="#fdd835"/>
  </g>
  <!-- Candy (red) -->
  <circle cx="100" cy="90" r="14" fill="#e53935"/>
  <circle cx="100" cy="90" r="14" fill="none" stroke="#b71c1c" stroke-width="2"/>
  <ellipse cx="95" cy="85" rx="3" ry="2" fill="#fff" opacity="0.6"/>
  <!-- Candy wrapper twists -->
  <polygon points="84,87 78,80 78,95 84,93" fill="#e53935"/>
  <polygon points="116,87 122,80 122,95 116,93" fill="#e53935"/>
  <!-- Om Nom (green monster) -->
  <circle cx="100" cy="155" r="32" fill="#7cb342"/>
  <!-- Eyes -->
  <circle cx="88" cy="148" r="8" fill="#fff"/>
  <circle cx="112" cy="148" r="8" fill="#fff"/>
  <circle cx="89" cy="149" r="3" fill="#1a1a1a"/>
  <circle cx="113" cy="149" r="3" fill="#1a1a1a"/>
  <!-- Mouth (open eager) -->
  <ellipse cx="100" cy="170" rx="11" ry="6" fill="#1a1a1a"/>
  <ellipse cx="100" cy="172" rx="8" ry="3" fill="#e91e63"/>
  <!-- Tooth -->
  <polygon points="92,165 96,170 100,165" fill="#fff"/>
  <polygon points="100,165 104,170 108,165" fill="#fff"/>
  <!-- Title -->
  <text x="100" y="195" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="11" font-weight="900">CUT THE ROPE</text>
</svg>
