<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="dh-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff59d"/>
      <stop offset="1" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#dh-sky)"/>
  <!-- Sun -->
  <circle cx="35" cy="35" r="14" fill="#ffd54f"/>
  <!-- Drawn hill (squiggle line) -->
  <path d="M 0 150 Q 30 100 60 110 Q 90 120 100 80 Q 120 50 150 90 Q 180 130 200 100 L 200 200 L 0 200 Z" fill="#90a4ae" stroke="#212121" stroke-width="2.5"/>
  <!-- Pencil tip drawing the line -->
  <g transform="translate(155 90) rotate(35)">
    <rect x="-3" y="-30" width="6" height="50" fill="#fdd835" stroke="#212121" stroke-width="1"/>
    <polygon points="-3,20 0,30 3,20" fill="#ffccbc" stroke="#212121" stroke-width="1"/>
    <polygon points="-1,28 0,30 1,28" fill="#212121"/>
    <rect x="-3" y="-32" width="6" height="3" fill="#ec407a" stroke="#212121" stroke-width="1"/>
  </g>
  <!-- Car at top -->
  <g transform="translate(100 70)">
    <rect x="-12" y="-2" width="24" height="9" rx="2" fill="#e53935" stroke="#212121" stroke-width="1.5"/>
    <polygon points="-6,-2 -3,-8 8,-8 12,-2" fill="#42a5f5" stroke="#212121" stroke-width="1"/>
    <circle cx="-6" cy="9" r="3" fill="#212121"/>
    <circle cx="6" cy="9" r="3" fill="#212121"/>
  </g>
  <!-- Title -->
  <text x="100" y="185" text-anchor="middle" fill="#212121" font-family="Arial Black" font-size="15" font-weight="900">DRAW THE HILL</text>
</svg>
