<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="tc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5e35b1"/>
      <stop offset="1" stop-color="#1a237e"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#tc-bg)"/>
  <!-- Glow stars -->
  <circle cx="20" cy="30" r="1.5" fill="#fff"/>
  <circle cx="180" cy="40" r="1" fill="#fff"/>
  <circle cx="30" cy="170" r="1.5" fill="#fff"/>
  <circle cx="170" cy="170" r="1" fill="#fff"/>
  <!-- Cube (isometric, glowing) -->
  <g transform="translate(100 100)">
    <!-- Top face -->
    <polygon points="0,-50 45,-25 0,0 -45,-25" fill="#7e57c2" stroke="#fff" stroke-width="2"/>
    <!-- Right face -->
    <polygon points="45,-25 45,30 0,55 0,0" fill="#5e35b1" stroke="#fff" stroke-width="2"/>
    <!-- Left face -->
    <polygon points="-45,-25 -45,30 0,55 0,0" fill="#4527a0" stroke="#fff" stroke-width="2"/>
    <!-- Glow lines on faces -->
    <line x1="-22" y1="-12" x2="22" y2="-12" stroke="#b39ddb" stroke-width="1" opacity="0.6"/>
    <line x1="-22" y1="14" x2="0" y2="28" stroke="#b39ddb" stroke-width="1" opacity="0.6"/>
    <line x1="22" y1="14" x2="0" y2="28" stroke="#b39ddb" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Glow effect -->
  <circle cx="100" cy="100" r="55" fill="#b39ddb" opacity="0.15"/>
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="20" font-weight="900" stroke="#5e35b1" stroke-width="0.8">TRANS CUBE</text>
</svg>
