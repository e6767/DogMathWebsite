<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="ssf-bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#ffeb3b"/>
      <stop offset="1" stop-color="#f57c00"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#ssf-bg)"/>
  <!-- Speed lines radiating -->
  <g stroke="#fff" stroke-width="3" opacity="0.5">
    <line x1="100" y1="100" x2="20" y2="20"/>
    <line x1="100" y1="100" x2="180" y2="20"/>
    <line x1="100" y1="100" x2="20" y2="180"/>
    <line x1="100" y1="100" x2="180" y2="180"/>
    <line x1="100" y1="100" x2="0" y2="100"/>
    <line x1="100" y1="100" x2="200" y2="100"/>
  </g>
  <!-- Smash Ball -->
  <g transform="translate(100 100)">
    <circle r="46" fill="#fff" stroke="#212121" stroke-width="3"/>
    <circle r="46" fill="none" stroke="#e53935" stroke-width="2" opacity="0.5"/>
    <!-- Smash Bros logo (cross) -->
    <g stroke="#212121" stroke-width="6" stroke-linecap="round">
      <line x1="-22" y1="-22" x2="22" y2="22"/>
      <line x1="-22" y1="22" x2="22" y2="-22"/>
    </g>
    <!-- Center circle -->
    <circle r="8" fill="#e53935" stroke="#212121" stroke-width="3"/>
    <!-- Glow shimmer -->
    <ellipse cx="-15" cy="-20" rx="8" ry="4" fill="#fff" opacity="0.7" transform="rotate(-30)"/>
  </g>
  <!-- Lightning bolts -->
  <polygon points="20,90 35,85 28,98 40,95 25,115 32,105 18,108" fill="#fdd835" stroke="#212121" stroke-width="1"/>
  <polygon points="180,90 165,85 172,98 160,95 175,115 168,105 182,108" fill="#fdd835" stroke="#212121" stroke-width="1"/>
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="14" font-weight="900" stroke="#212121" stroke-width="1">SUPER SMASH</text>
</svg>
