<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="ltf3-bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#1a237e"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#ltf3-bg)"/>
  <!-- Stars -->
  <circle cx="20" cy="30" r="1.5" fill="#fff"/>
  <circle cx="180" cy="40" r="1" fill="#fff"/>
  <circle cx="40" cy="70" r="1" fill="#fff"/>
  <circle cx="170" cy="90" r="1.5" fill="#fff"/>
  <circle cx="30" cy="120" r="1" fill="#fff"/>
  <circle cx="160" cy="160" r="1.5" fill="#fff"/>
  <!-- Earth (curved horizon) -->
  <ellipse cx="100" cy="240" rx="200" ry="80" fill="#1976d2"/>
  <ellipse cx="100" cy="240" rx="180" ry="65" fill="#42a5f5"/>
  <!-- Penguin in rocket -->
  <g transform="translate(100 110)">
    <!-- Rocket body -->
    <path d="M -16 -40 L 16 -40 L 20 30 L -20 30 Z" fill="#e0e0e0" stroke="#212121" stroke-width="2"/>
    <!-- Rocket nose -->
    <polygon points="-16,-40 0,-65 16,-40" fill="#e53935" stroke="#212121" stroke-width="2"/>
    <!-- Window -->
    <circle cx="0" cy="-15" r="11" fill="#212121" stroke="#fff" stroke-width="1.5"/>
    <!-- Penguin in window -->
    <circle cx="0" cy="-15" r="8" fill="#fff"/>
    <circle cx="-3" cy="-15" r="2" fill="#212121"/>
    <circle cx="3" cy="-15" r="2" fill="#212121"/>
    <polygon points="-2,-10 2,-10 0,-6" fill="#ff9800"/>
    <!-- Fins -->
    <polygon points="-20,30 -32,40 -16,30" fill="#e53935" stroke="#212121" stroke-width="1.5"/>
    <polygon points="20,30 32,40 16,30" fill="#e53935" stroke="#212121" stroke-width="1.5"/>
    <!-- Flame -->
    <path d="M -12 32 Q -8 50 -4 35 Q 0 55 4 35 Q 8 50 12 32 L 12 30 L -12 30 Z" fill="#ff9800"/>
    <path d="M -8 32 Q -4 45 0 35 Q 4 45 8 32 L 8 30 L -8 30 Z" fill="#fdd835"/>
  </g>
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" fill="#fdd835" font-family="Arial Black" font-size="18" font-weight="900" stroke="#1a237e" stroke-width="0.8">LEARN TO FLY 3</text>
</svg>
