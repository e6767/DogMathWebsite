<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sm64-bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#1976d2"/>
      <stop offset="1" stop-color="#0d47a1"/>
    </radialGradient>
    <linearGradient id="sm64-star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff59d"/>
      <stop offset="1" stop-color="#fdd835"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#sm64-bg)"/>
  <!-- Stars background -->
  <circle cx="30" cy="30" r="1.5" fill="#fff"/>
  <circle cx="170" cy="40" r="1" fill="#fff"/>
  <circle cx="40" cy="170" r="1.5" fill="#fff"/>
  <circle cx="180" cy="180" r="1" fill="#fff"/>
  <circle cx="20" cy="100" r="1" fill="#fff"/>
  <!-- Power Star -->
  <g transform="translate(100 95)">
    <polygon points="0,-50 12,-15 48,-15 18,8 30,42 0,22 -30,42 -18,8 -48,-15 -12,-15" fill="url(#sm64-star)" stroke="#f57f17" stroke-width="2"/>
    <!-- Eyes -->
    <ellipse cx="-9" cy="-3" rx="3" ry="5" fill="#1565c0"/>
    <ellipse cx="9" cy="-3" rx="3" ry="5" fill="#1565c0"/>
    <ellipse cx="-9" cy="-5" rx="1" ry="1.5" fill="#fff"/>
    <ellipse cx="9" cy="-5" rx="1" ry="1.5" fill="#fff"/>
  </g>
  <!-- 64 -->
  <text x="100" y="170" text-anchor="middle" fill="#e53935" font-family="Arial Black" font-size="36" font-weight="900" stroke="#fff" stroke-width="1.2">SUPER 64</text>
  <text x="100" y="194" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="11" font-weight="700">SUPER MARIO 64</text>
</svg>
