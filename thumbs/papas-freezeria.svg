<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pf-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#80deea"/>
      <stop offset="1" stop-color="#4dd0e1"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#pf-bg)"/>
  <!-- Cup (sundae glass) -->
  <polygon points="60,80 140,80 130,165 70,165" fill="#e1f5fe" stroke="#0277bd" stroke-width="2.5" opacity="0.7"/>
  <line x1="65" y1="100" x2="135" y2="100" stroke="#0277bd" stroke-width="1" opacity="0.5"/>
  <!-- Ice cream stripes inside cup -->
  <rect x="68" y="100" width="64" height="20" fill="#ffccbc"/>
  <rect x="70" y="120" width="60" height="20" fill="#fff"/>
  <rect x="72" y="140" width="56" height="20" fill="#ffe082"/>
  <!-- Whipped cream swirls (top) -->
  <ellipse cx="100" cy="78" rx="42" ry="14" fill="#fff8e1" stroke="#bdbdbd" stroke-width="1.5"/>
  <ellipse cx="100" cy="68" rx="32" ry="14" fill="#fff" stroke="#bdbdbd" stroke-width="1.5"/>
  <ellipse cx="100" cy="56" rx="22" ry="12" fill="#fff8e1" stroke="#bdbdbd" stroke-width="1.5"/>
  <ellipse cx="100" cy="46" rx="14" ry="10" fill="#fff" stroke="#bdbdbd" stroke-width="1.5"/>
  <!-- Cherry -->
  <circle cx="100" cy="38" r="7" fill="#e53935" stroke="#b71c1c" stroke-width="1"/>
  <line x1="100" y1="32" x2="103" y2="22" stroke="#43a047" stroke-width="2"/>
  <ellipse cx="105" cy="22" rx="3" ry="2" fill="#43a047"/>
  <!-- Sprinkles -->
  <rect x="80" y="60" width="3" height="6" fill="#e91e63" transform="rotate(20 81 63)"/>
  <rect x="120" y="65" width="3" height="6" fill="#fdd835" transform="rotate(-30 121 68)"/>
  <rect x="90" y="50" width="3" height="6" fill="#43a047" transform="rotate(45 91 53)"/>
  <!-- Straw -->
  <line x1="120" y1="40" x2="135" y2="80" stroke="#e91e63" stroke-width="3"/>
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="14" font-weight="900" stroke="#01579b" stroke-width="0.8">PAPA'S FREEZERIA</text>
</svg>
