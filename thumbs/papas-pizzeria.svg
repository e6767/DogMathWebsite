<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bf360c"/>
      <stop offset="1" stop-color="#d84315"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#pp-bg)"/>
  <!-- Checkered pattern (pizzeria tablecloth) -->
  <g opacity="0.2">
    <rect x="0" y="0" width="20" height="20" fill="#fff"/>
    <rect x="40" y="0" width="20" height="20" fill="#fff"/>
    <rect x="80" y="0" width="20" height="20" fill="#fff"/>
    <rect x="120" y="0" width="20" height="20" fill="#fff"/>
    <rect x="160" y="0" width="20" height="20" fill="#fff"/>
    <rect x="20" y="20" width="20" height="20" fill="#fff"/>
    <rect x="60" y="20" width="20" height="20" fill="#fff"/>
    <rect x="100" y="20" width="20" height="20" fill="#fff"/>
    <rect x="140" y="20" width="20" height="20" fill="#fff"/>
    <rect x="180" y="20" width="20" height="20" fill="#fff"/>
  </g>
  <!-- Pizza -->
  <g transform="translate(100 110)">
    <!-- Crust -->
    <circle r="68" fill="#ffb74d" stroke="#5d4037" stroke-width="3"/>
    <!-- Cheese/sauce -->
    <circle r="60" fill="#ffeb3b"/>
    <circle r="60" fill="#e53935" opacity="0.4"/>
    <!-- Pepperoni -->
    <circle cx="-25" cy="-20" r="9" fill="#c62828" stroke="#8e0000" stroke-width="1"/>
    <circle cx="25" cy="-20" r="9" fill="#c62828" stroke="#8e0000" stroke-width="1"/>
    <circle cx="-30" cy="20" r="9" fill="#c62828" stroke="#8e0000" stroke-width="1"/>
    <circle cx="30" cy="20" r="9" fill="#c62828" stroke="#8e0000" stroke-width="1"/>
    <circle cx="0" cy="-30" r="9" fill="#c62828" stroke="#8e0000" stroke-width="1"/>
    <circle cx="0" cy="30" r="9" fill="#c62828" stroke="#8e0000" stroke-width="1"/>
    <!-- Slice cuts -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#5d4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#5d4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="-42" y1="-42" x2="42" y2="42" stroke="#5d4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="-42" y1="42" x2="42" y2="-42" stroke="#5d4037" stroke-width="0.5" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="14" font-weight="900" stroke="#3e2723" stroke-width="0.8">PAPA'S PIZZERIA</text>
</svg>
