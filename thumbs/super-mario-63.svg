<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sm63-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#42a5f5"/>
      <stop offset="1" stop-color="#1565c0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#sm63-bg)"/>
  <!-- Clouds -->
  <ellipse cx="35" cy="35" rx="22" ry="9" fill="#fff" opacity="0.9"/>
  <ellipse cx="170" cy="50" rx="20" ry="8" fill="#fff" opacity="0.8"/>
  <!-- Pipe -->
  <rect x="20" y="120" width="40" height="60" fill="#43a047" stroke="#1b5e20" stroke-width="2"/>
  <rect x="14" y="110" width="52" height="14" fill="#43a047" stroke="#1b5e20" stroke-width="2"/>
  <!-- Mushroom (1-up) -->
  <g transform="translate(150 100)">
    <ellipse cx="0" cy="0" rx="20" ry="18" fill="#43a047"/>
    <circle cx="-8" cy="-4" r="5" fill="#fff"/>
    <circle cx="8" cy="-4" r="5" fill="#fff"/>
    <circle cx="0" cy="-10" r="4" fill="#fff"/>
    <rect x="-8" y="14" width="16" height="14" rx="2" fill="#fff8e1"/>
    <rect x="-5" y="20" width="3" height="3" fill="#1a1a1a"/>
    <rect x="2" y="20" width="3" height="3" fill="#1a1a1a"/>
  </g>
  <!-- Big "63" -->
  <text x="100" y="120" text-anchor="middle" fill="#fdd835" font-family="Arial Black" font-size="76" font-weight="900" stroke="#e53935" stroke-width="2.5">63</text>
  <!-- Title -->
  <text x="100" y="155" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="14" font-weight="900" stroke="#1565c0" stroke-width="0.6">SUPER MARIO</text>
  <!-- Coin -->
  <circle cx="100" cy="180" r="10" fill="#fdd835" stroke="#f57f17" stroke-width="2"/>
  <text x="100" y="184" text-anchor="middle" fill="#f57f17" font-family="Arial Black" font-size="10" font-weight="900">$</text>
</svg>
