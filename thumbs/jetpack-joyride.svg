<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="jj-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f0c29"/>
      <stop offset="0.5" stop-color="#302b63"/>
      <stop offset="1" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="jj-flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9800"/>
      <stop offset="1" stop-color="#ff5722"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#jj-sky)"/>
  <!-- Stars -->
  <circle cx="20" cy="18" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="55" cy="35" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="140" cy="22" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="175" cy="45" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="90" cy="12" r="1" fill="#fff" opacity="0.9"/>
  <circle cx="165" cy="15" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="30" cy="60" r="1" fill="#fff" opacity="0.4"/>
  <!-- Coins -->
  <circle cx="40" cy="70" r="9" fill="#fdd835" stroke="#f9a825" stroke-width="2"/>
  <text x="40" y="74" text-anchor="middle" fill="#f9a825" font-size="10" font-weight="bold">$</text>
  <circle cx="160" cy="55" r="9" fill="#fdd835" stroke="#f9a825" stroke-width="2"/>
  <text x="160" y="59" text-anchor="middle" fill="#f9a825" font-size="10" font-weight="bold">$</text>
  <circle cx="25" cy="130" r="7" fill="#fdd835" stroke="#f9a825" stroke-width="1.5"/>
  <text x="25" y="134" text-anchor="middle" fill="#f9a825" font-size="8" font-weight="bold">$</text>
  <!-- Jetpack (behind character) -->
  <rect x="105" y="82" width="22" height="32" rx="4" fill="#546e7a" stroke="#37474f" stroke-width="1.5"/>
  <rect x="109" y="86" width="6" height="10" rx="2" fill="#78909c"/>
  <rect x="117" y="86" width="6" height="10" rx="2" fill="#78909c"/>
  <!-- Jetpack nozzle -->
  <rect x="111" y="112" width="6" height="6" rx="2" fill="#37474f"/>
  <!-- Flame -->
  <ellipse cx="114" cy="124" rx="7" ry="14" fill="url(#jj-flame)" opacity="0.9"/>
  <ellipse cx="114" cy="128" rx="4" ry="9" fill="#ffeb3b" opacity="0.8"/>
  <!-- Character body (green jumpsuit) -->
  <ellipse cx="95" cy="88" rx="14" ry="16" fill="#43a047"/>
  <!-- Head -->
  <circle cx="95" cy="70" r="13" fill="#ffcc80"/>
  <!-- Helmet visor -->
  <ellipse cx="98" cy="68" rx="9" ry="7" fill="#29b6f6" opacity="0.7"/>
  <ellipse cx="98" cy="68" rx="9" ry="7" fill="none" stroke="#0288d1" stroke-width="1.5"/>
  <!-- Arm pointing forward -->
  <line x1="95" y1="94" x2="68" y2="105" stroke="#43a047" stroke-width="7" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="92" y1="104" x2="85" y2="126" stroke="#1b5e20" stroke-width="7" stroke-linecap="round"/>
  <line x1="98" y1="104" x2="105" y2="124" stroke="#1b5e20" stroke-width="7" stroke-linecap="round"/>
  <!-- Boots -->
  <ellipse cx="83" cy="128" rx="7" ry="4" fill="#37474f"/>
  <ellipse cx="107" cy="126" rx="7" ry="4" fill="#37474f"/>
  <!-- Title -->
  <text x="100" y="160" text-anchor="middle" fill="#fdd835" font-family="Arial Black" font-size="13" font-weight="900" stroke="#f57f17" stroke-width="0.5">JETPACK</text>
  <text x="100" y="178" text-anchor="middle" fill="#fdd835" font-family="Arial Black" font-size="13" font-weight="900" stroke="#f57f17" stroke-width="0.5">JOYRIDE</text>
</svg>
