<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="aa-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d47a1"/>
      <stop offset="1" stop-color="#01579b"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#aa-bg)"/>
  <!-- Speed lines -->
  <g stroke="#fff" stroke-width="2" opacity="0.4">
    <line x1="0" y1="60" x2="40" y2="60"/>
    <line x1="0" y1="100" x2="60" y2="100"/>
    <line x1="0" y1="140" x2="40" y2="140"/>
    <line x1="160" y1="60" x2="200" y2="60"/>
    <line x1="140" y1="100" x2="200" y2="100"/>
  </g>
  <!-- Gavel -->
  <g transform="translate(100 60) rotate(-20)">
    <rect x="-30" y="-12" width="60" height="24" rx="4" fill="#8d6e63" stroke="#3e2723" stroke-width="2"/>
    <rect x="-26" y="-8" width="52" height="2" fill="#5d4037"/>
    <rect x="-26" y="6" width="52" height="2" fill="#5d4037"/>
    <rect x="-3" y="12" width="6" height="35" fill="#6d4c41"/>
  </g>
  <!-- OBJECTION! speech bubble -->
  <g transform="translate(100 130)">
    <ellipse rx="80" ry="22" fill="#fdd835" stroke="#212121" stroke-width="3"/>
    <text x="0" y="6" text-anchor="middle" fill="#e53935" font-family="Arial Black" font-size="22" font-weight="900" stroke="#212121" stroke-width="0.8">OBJECTION!</text>
  </g>
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="14" font-weight="900">ACE ATTORNEY</text>
</svg>
