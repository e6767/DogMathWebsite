<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#5c94fc"/>
  <!-- Cloud (8-bit style) -->
  <g fill="#fff">
    <rect x="20" y="30" width="8" height="4"/>
    <rect x="16" y="34" width="20" height="4"/>
    <rect x="12" y="38" width="32" height="4"/>
    <rect x="20" y="42" width="20" height="4"/>
  </g>
  <!-- Question block -->
  <rect x="135" y="60" width="32" height="32" fill="#f9a825"/>
  <rect x="135" y="60" width="32" height="32" fill="none" stroke="#e65100" stroke-width="2"/>
  <text x="151" y="86" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="22" font-weight="900">?</text>
  <!-- Ground -->
  <rect x="0" y="155" width="200" height="45" fill="#a52a2a"/>
  <!-- Ground pattern -->
  <g fill="#7d1f00">
    <rect x="0" y="160" width="200" height="2"/>
    <rect x="20" y="160" width="2" height="20"/>
    <rect x="60" y="160" width="2" height="20"/>
    <rect x="100" y="160" width="2" height="20"/>
    <rect x="140" y="160" width="2" height="20"/>
    <rect x="180" y="160" width="2" height="20"/>
  </g>
  <!-- Mario (8-bit pixelated) -->
  <g transform="translate(50 95)">
    <!-- Hat -->
    <rect x="8" y="0" width="20" height="6" fill="#e53935"/>
    <rect x="4" y="6" width="28" height="6" fill="#e53935"/>
    <!-- Face -->
    <rect x="4" y="12" width="28" height="14" fill="#ffcc80"/>
    <!-- Eyes -->
    <rect x="20" y="16" width="4" height="6" fill="#1a1a1a"/>
    <!-- Mustache -->
    <rect x="14" y="22" width="14" height="4" fill="#3e2723"/>
    <!-- Body (overalls) -->
    <rect x="6" y="26" width="24" height="18" fill="#1565c0"/>
    <!-- Shirt -->
    <rect x="0" y="26" width="6" height="10" fill="#e53935"/>
    <rect x="30" y="26" width="6" height="10" fill="#e53935"/>
    <!-- Buttons -->
    <rect x="12" y="32" width="3" height="3" fill="#fdd835"/>
    <rect x="22" y="32" width="3" height="3" fill="#fdd835"/>
    <!-- Legs -->
    <rect x="8" y="44" width="8" height="12" fill="#5d4037"/>
    <rect x="20" y="44" width="8" height="12" fill="#5d4037"/>
  </g>
  <!-- Title -->
  <text x="100" y="195" text-anchor="middle" fill="#fdd835" font-family="Arial Black" font-size="14" font-weight="900" stroke="#e53935" stroke-width="0.5">SUPER MARIO</text>
</svg>
