<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ssf-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8a65"/>
      <stop offset="1" stop-color="#ffab91"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#ssf-sky)"/>
  <!-- Golden Gate Bridge towers -->
  <g fill="#d84315" stroke="#bf360c" stroke-width="1">
    <rect x="40" y="40" width="14" height="100"/>
    <rect x="146" y="40" width="14" height="100"/>
    <!-- Cross beams -->
    <rect x="36" y="50" width="22" height="6"/>
    <rect x="142" y="50" width="22" height="6"/>
    <rect x="36" y="80" width="22" height="6"/>
    <rect x="142" y="80" width="22" height="6"/>
  </g>
  <!-- Bridge cables (curved) -->
  <path d="M 47 50 Q 100 110 153 50" stroke="#d84315" stroke-width="3" fill="none"/>
  <!-- Train tracks (perspective) -->
  <g fill="#37474f">
    <polygon points="0,200 40,140 60,140 80,200"/>
    <polygon points="80,200 90,140 110,140 120,200"/>
    <polygon points="120,200 140,140 160,140 200,200"/>
  </g>
  <!-- Track lines -->
  <line x1="50" y1="140" x2="20" y2="200" stroke="#fdd835" stroke-width="2"/>
  <line x1="100" y1="140" x2="100" y2="200" stroke="#fdd835" stroke-width="2"/>
  <line x1="150" y1="140" x2="180" y2="200" stroke="#fdd835" stroke-width="2"/>
  <!-- Train coming -->
  <rect x="80" y="105" width="40" height="35" rx="4" fill="#1e88e5" stroke="#0d47a1" stroke-width="2"/>
  <rect x="86" y="112" width="12" height="10" fill="#fff"/>
  <rect x="102" y="112" width="12" height="10" fill="#fff"/>
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="13" font-weight="900" stroke="#bf360c" stroke-width="0.7">SUBWAY SURFERS</text>
  <text x="100" y="194" text-anchor="middle" fill="#fdd835" font-family="Arial Black" font-size="12" font-weight="900" stroke="#bf360c" stroke-width="0.5">SAN FRANCISCO</text>
</svg>
