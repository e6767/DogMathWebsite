<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1b5e20"/>
  <!-- Felt texture dots -->
  <g opacity="0.3" fill="#2e7d32">
    <circle cx="20" cy="20" r="1"/>
    <circle cx="60" cy="40" r="1"/>
    <circle cx="100" cy="20" r="1"/>
    <circle cx="160" cy="50" r="1"/>
    <circle cx="180" cy="180" r="1"/>
    <circle cx="40" cy="180" r="1"/>
  </g>
  <!-- Stack of cards (fanned) -->
  <g transform="translate(50 60) rotate(-12)">
    <rect width="60" height="84" rx="6" fill="#fff" stroke="#212121" stroke-width="1.5"/>
    <text x="9" y="18" fill="#1976d2" font-family="Georgia" font-size="14" font-weight="bold">10</text>
    <text x="9" y="32" fill="#1976d2" font-family="Georgia" font-size="14" font-weight="bold">♦</text>
  </g>
  <g transform="translate(70 56) rotate(-4)">
    <rect width="60" height="84" rx="6" fill="#fff" stroke="#212121" stroke-width="1.5"/>
    <text x="9" y="18" fill="#212121" font-family="Georgia" font-size="14" font-weight="bold">J</text>
    <text x="9" y="32" fill="#212121" font-family="Georgia" font-size="14" font-weight="bold">♠</text>
  </g>
  <g transform="translate(90 54) rotate(4)">
    <rect width="60" height="84" rx="6" fill="#fff" stroke="#212121" stroke-width="1.5"/>
    <text x="9" y="18" fill="#d32f2f" font-family="Georgia" font-size="14" font-weight="bold">Q</text>
    <text x="9" y="32" fill="#d32f2f" font-family="Georgia" font-size="14" font-weight="bold">♥</text>
  </g>
  <g transform="translate(110 58) rotate(12)">
    <rect width="60" height="84" rx="6" fill="#fff" stroke="#212121" stroke-width="1.5"/>
    <text x="9" y="18" fill="#212121" font-family="Georgia" font-size="14" font-weight="bold">K</text>
    <text x="9" y="32" fill="#212121" font-family="Georgia" font-size="14" font-weight="bold">♣</text>
  </g>
  <!-- Title -->
  <text x="100" y="185" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="20" font-weight="900">SOLITAIRE</text>
</svg>
