<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#fff"/>
  <!-- Grid pattern -->
  <g stroke="#ddd" stroke-width="1">
    <line x1="0" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/>
    <line x1="0" y1="160" x2="200" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
  </g>
  <!-- Safe zones (light green/red) -->
  <rect x="0" y="0" width="50" height="200" fill="#c8e6c9" opacity="0.6"/>
  <rect x="150" y="0" width="50" height="200" fill="#ffcdd2" opacity="0.6"/>
  <!-- Blue circles (enemies) -->
  <circle cx="80" cy="60" r="11" fill="#1976d2" stroke="#fff" stroke-width="2"/>
  <circle cx="120" cy="100" r="11" fill="#1976d2" stroke="#fff" stroke-width="2"/>
  <circle cx="80" cy="140" r="11" fill="#1976d2" stroke="#fff" stroke-width="2"/>
  <circle cx="120" cy="60" r="11" fill="#1976d2" stroke="#fff" stroke-width="2"/>
  <circle cx="80" cy="100" r="11" fill="#1976d2" stroke="#fff" stroke-width="2"/>
  <circle cx="120" cy="140" r="11" fill="#1976d2" stroke="#fff" stroke-width="2"/>
  <!-- Red square (player) -->
  <rect x="14" y="94" width="22" height="22" fill="#e53935" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Title -->
  <rect x="0" y="170" width="200" height="30" fill="#1a1a1a" opacity="0.85"/>
  <text x="100" y="190" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="13" font-weight="900">WORLD'S HARDEST</text>
</svg>
