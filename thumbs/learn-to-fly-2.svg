<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ltf2-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bbdefb"/>
      <stop offset="0.7" stop-color="#e1f5fe"/>
      <stop offset="1" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#ltf2-sky)"/>
  <!-- Snow ground -->
  <rect x="0" y="170" width="200" height="30" fill="#fff"/>
  <ellipse cx="100" cy="170" rx="200" ry="8" fill="#e3f2fd"/>
  <!-- Mountain in distance -->
  <polygon points="0,170 50,110 100,160 150,100 200,170" fill="#90caf9" opacity="0.8"/>
  <polygon points="40,135 50,110 60,135" fill="#fff"/>
  <polygon points="140,125 150,100 160,125" fill="#fff"/>
  <!-- Penguin (with sled) -->
  <g transform="translate(100 110)">
    <!-- Sled -->
    <rect x="-30" y="20" width="60" height="6" fill="#a1887f" stroke="#3e2723" stroke-width="1.5"/>
    <line x1="-25" y1="26" x2="-25" y2="36" stroke="#3e2723" stroke-width="2"/>
    <line x1="25" y1="26" x2="25" y2="36" stroke="#3e2723" stroke-width="2"/>
    <line x1="-30" y1="36" x2="30" y2="36" stroke="#3e2723" stroke-width="3"/>
    <!-- Penguin body -->
    <ellipse cx="0" cy="-5" rx="22" ry="26" fill="#212121"/>
    <ellipse cx="0" cy="0" rx="14" ry="20" fill="#fff"/>
    <!-- Head -->
    <circle cx="0" cy="-25" r="14" fill="#212121"/>
    <ellipse cx="0" cy="-22" rx="9" ry="6" fill="#fff"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-26" r="2" fill="#fff"/>
    <circle cx="4" cy="-26" r="2" fill="#fff"/>
    <circle cx="-4" cy="-26" r="1" fill="#212121"/>
    <circle cx="4" cy="-26" r="1" fill="#212121"/>
    <!-- Beak -->
    <polygon points="-3,-19 3,-19 0,-13" fill="#ff9800" stroke="#e65100" stroke-width="1"/>
    <!-- Helmet -->
    <path d="M -14 -32 Q 0 -42 14 -32 L 14 -25 L -14 -25 Z" fill="#e53935" stroke="#212121" stroke-width="1.5"/>
    <line x1="0" y1="-42" x2="0" y2="-46" stroke="#212121" stroke-width="2"/>
    <circle cx="0" cy="-48" r="2" fill="#fdd835"/>
  </g>
  <!-- Speed lines -->
  <g stroke="#1976d2" stroke-width="2" opacity="0.6">
    <line x1="160" y1="100" x2="190" y2="100"/>
    <line x1="155" y1="115" x2="185" y2="115"/>
  </g>
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" fill="#1565c0" font-family="Arial Black" font-size="18" font-weight="900" stroke="#fff" stroke-width="0.8">LEARN TO FLY 2</text>
</svg>
