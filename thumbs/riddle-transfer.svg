<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="rt-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffcc80"/>
      <stop offset="1" stop-color="#ffb74d"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#rt-bg)"/>
  <!-- Sun -->
  <circle cx="170" cy="35" r="14" fill="#fdd835"/>
  <!-- Road -->
  <rect x="0" y="160" width="200" height="40" fill="#37474f"/>
  <line x1="0" y1="180" x2="200" y2="180" stroke="#fdd835" stroke-width="3" stroke-dasharray="14 10"/>
  <!-- School Bus -->
  <g transform="translate(100 130)">
    <!-- Body -->
    <rect x="-60" y="-25" width="120" height="40" rx="5" fill="#fdd835" stroke="#212121" stroke-width="2"/>
    <!-- Hood -->
    <rect x="-72" y="-10" width="14" height="25" rx="3" fill="#fdd835" stroke="#212121" stroke-width="2"/>
    <!-- Windshield -->
    <rect x="-68" y="-20" width="14" height="14" fill="#90caf9" stroke="#212121" stroke-width="1.5"/>
    <!-- Windows -->
    <rect x="-50" y="-20" width="14" height="14" fill="#90caf9" stroke="#212121" stroke-width="1.5"/>
    <rect x="-32" y="-20" width="14" height="14" fill="#90caf9" stroke="#212121" stroke-width="1.5"/>
    <rect x="-14" y="-20" width="14" height="14" fill="#90caf9" stroke="#212121" stroke-width="1.5"/>
    <rect x="4" y="-20" width="14" height="14" fill="#90caf9" stroke="#212121" stroke-width="1.5"/>
    <rect x="22" y="-20" width="14" height="14" fill="#90caf9" stroke="#212121" stroke-width="1.5"/>
    <rect x="40" y="-20" width="14" height="14" fill="#90caf9" stroke="#212121" stroke-width="1.5"/>
    <!-- Stripe -->
    <rect x="-60" y="0" width="120" height="3" fill="#212121"/>
    <!-- Wheels -->
    <circle cx="-40" cy="20" r="11" fill="#212121"/>
    <circle cx="-40" cy="20" r="5" fill="#9e9e9e"/>
    <circle cx="40" cy="20" r="11" fill="#212121"/>
    <circle cx="40" cy="20" r="5" fill="#9e9e9e"/>
    <!-- Stop sign -->
    <polygon points="-72,-2 -65,-7 -57,-7 -50,-2 -50,5 -57,10 -65,10 -72,5" fill="#e53935" stroke="#fff" stroke-width="1"/>
    <text x="-61" y="6" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="6" font-weight="900">STOP</text>
  </g>
  <!-- Title -->
  <text x="100" y="65" text-anchor="middle" fill="#5d4037" font-family="Arial Black" font-size="14" font-weight="900" stroke="#fff" stroke-width="0.6">RIDDLE</text>
  <text x="100" y="85" text-anchor="middle" fill="#5d4037" font-family="Arial Black" font-size="20" font-weight="900" stroke="#fff" stroke-width="0.8">TRANSFER</text>
</svg>
