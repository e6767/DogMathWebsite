<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="hsp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3e2723"/>
      <stop offset="1" stop-color="#212121"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#hsp-bg)"/>
  <!-- Brick wall pattern -->
  <g fill="#5d4037" opacity="0.6">
    <rect x="0" y="20" width="40" height="14"/>
    <rect x="44" y="20" width="40" height="14"/>
    <rect x="88" y="20" width="40" height="14"/>
    <rect x="132" y="20" width="40" height="14"/>
    <rect x="176" y="20" width="40" height="14"/>
    <rect x="20" y="38" width="40" height="14"/>
    <rect x="64" y="38" width="40" height="14"/>
    <rect x="108" y="38" width="40" height="14"/>
    <rect x="152" y="38" width="40" height="14"/>
  </g>
  <!-- Prison bars -->
  <g stroke="#9e9e9e" stroke-width="6">
    <line x1="20" y1="60" x2="20" y2="160"/>
    <line x1="60" y1="60" x2="60" y2="160"/>
    <line x1="100" y1="60" x2="100" y2="160"/>
    <line x1="140" y1="60" x2="140" y2="160"/>
    <line x1="180" y1="60" x2="180" y2="160"/>
  </g>
  <line x1="0" y1="60" x2="200" y2="60" stroke="#9e9e9e" stroke-width="5"/>
  <line x1="0" y1="160" x2="200" y2="160" stroke="#9e9e9e" stroke-width="5"/>
  <!-- Stick figure (jumpsuit orange) -->
  <g stroke="#212121" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="80" cy="90" r="10" fill="#ff9800"/>
    <line x1="80" y1="100" x2="80" y2="130" stroke="#ff9800" stroke-width="6"/>
    <line x1="80" y1="130" x2="68" y2="155" stroke="#ff9800" stroke-width="5"/>
    <line x1="80" y1="130" x2="92" y2="155" stroke="#ff9800" stroke-width="5"/>
    <line x1="80" y1="110" x2="62" y2="125" stroke="#ff9800" stroke-width="4"/>
    <line x1="80" y1="110" x2="98" y2="125" stroke="#ff9800" stroke-width="4"/>
  </g>
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" fill="#ff9800" font-family="Arial Black" font-size="11" font-weight="900">HENRY STICKMIN</text>
  <text x="100" y="195" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="11" font-weight="900">ESCAPING THE PRISON</text>
</svg>
