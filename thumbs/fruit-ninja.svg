<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="fn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#3d2817"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#fn-bg)"/>
  <!-- Slash trail -->
  <path d="M 20 150 Q 100 50 180 130" stroke="#fff" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M 20 150 Q 100 50 180 130" stroke="#fff" stroke-width="6" fill="none" opacity="0.3"/>
  <!-- Watermelon half -->
  <path d="M 30 110 A 28 28 0 0 0 86 110 L 30 110 Z" fill="#e91e63"/>
  <path d="M 30 110 A 28 28 0 0 0 86 110 L 30 110 Z" fill="none" stroke="#1b5e20" stroke-width="3"/>
  <circle cx="48" cy="118" r="2" fill="#1a1a1a"/>
  <circle cx="58" cy="116" r="2" fill="#1a1a1a"/>
  <circle cx="68" cy="118" r="2" fill="#1a1a1a"/>
  <!-- Watermelon other half -->
  <path d="M 30 116 A 28 28 0 0 1 86 116 L 30 116 Z" fill="#e91e63" transform="translate(15 5) rotate(15 58 116)"/>
  <!-- Orange slice -->
  <circle cx="140" cy="80" r="22" fill="#ff9800"/>
  <circle cx="140" cy="80" r="22" fill="none" stroke="#e65100" stroke-width="2"/>
  <line x1="140" y1="60" x2="140" y2="100" stroke="#fff3e0" stroke-width="2"/>
  <line x1="120" y1="80" x2="160" y2="80" stroke="#fff3e0" stroke-width="2"/>
  <line x1="125" y1="65" x2="155" y2="95" stroke="#fff3e0" stroke-width="2"/>
  <line x1="155" y1="65" x2="125" y2="95" stroke="#fff3e0" stroke-width="2"/>
  <!-- Strawberry -->
  <path d="M 95 50 L 115 50 L 110 80 Q 105 88 100 80 Z" fill="#f44336"/>
  <ellipse cx="105" cy="48" rx="12" ry="5" fill="#4caf50"/>
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="16" font-weight="900" stroke="#000" stroke-width="0.5">FRUIT NINJA</text>
</svg>
