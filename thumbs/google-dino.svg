<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#f5f5f5"/>
  <!-- Ground line -->
  <line x1="0" y1="140" x2="200" y2="140" stroke="#535353" stroke-width="2"/>
  <!-- Ground bumps -->
  <circle cx="20" cy="143" r="1.5" fill="#535353"/>
  <circle cx="50" cy="142" r="1" fill="#535353"/>
  <circle cx="170" cy="143" r="1.5" fill="#535353"/>
  <circle cx="190" cy="142" r="1" fill="#535353"/>
  <!-- T-Rex (pixel art) -->
  <g fill="#535353">
    <rect x="60" y="70" width="36" height="8"/>
    <rect x="56" y="78" width="44" height="8"/>
    <rect x="52" y="86" width="48" height="16"/>
    <rect x="56" y="102" width="44" height="8"/>
    <rect x="60" y="110" width="40" height="8"/>
    <rect x="60" y="118" width="32" height="8"/>
    <rect x="60" y="126" width="20" height="14"/>
    <rect x="84" y="126" width="12" height="6"/>
    <rect x="76" y="132" width="16" height="8"/>
    <!-- Arms -->
    <rect x="92" y="102" width="8" height="6"/>
    <rect x="100" y="106" width="6" height="4"/>
    <!-- Eye (white) -->
  </g>
  <rect x="80" y="86" width="6" height="6" fill="#f5f5f5"/>
  <rect x="82" y="88" width="2" height="2" fill="#535353"/>
  <!-- Cactus -->
  <g fill="#535353">
    <rect x="148" y="100" width="8" height="40"/>
    <rect x="142" y="108" width="6" height="14"/>
    <rect x="156" y="112" width="6" height="14"/>
  </g>
  <!-- Cloud -->
  <g fill="#535353">
    <rect x="20" y="40" width="20" height="4"/>
    <rect x="16" y="44" width="28" height="4"/>
    <rect x="20" y="48" width="20" height="4"/>
  </g>
  <!-- Title -->
  <text x="100" y="178" text-anchor="middle" fill="#535353" font-family="Courier New" font-size="14" font-weight="bold">DINO RUN</text>
</svg>
