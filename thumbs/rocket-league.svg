<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="rl-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1565c0"/>
      <stop offset="0.5" stop-color="#1976d2"/>
      <stop offset="1" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="rl-flame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9800"/>
      <stop offset="1" stop-color="#ffeb3b"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#rl-bg)"/>
  <!-- Field lines (perspective) -->
  <g stroke="#fff" stroke-width="2" opacity="0.4">
    <line x1="100" y1="200" x2="60" y2="120"/>
    <line x1="100" y1="200" x2="140" y2="120"/>
    <line x1="0" y1="160" x2="200" y2="160"/>
  </g>
  <!-- Soccer ball (flying) -->
  <g transform="translate(140 60)">
    <circle r="16" fill="#fff" stroke="#212121" stroke-width="2"/>
    <polygon points="0,-12 8,-4 5,7 -5,7 -8,-4" fill="#212121"/>
    <line x1="0" y1="-12" x2="0" y2="-16" stroke="#212121" stroke-width="2"/>
    <line x1="8" y1="-4" x2="13" y2="-7" stroke="#212121" stroke-width="2"/>
    <line x1="-8" y1="-4" x2="-13" y2="-7" stroke="#212121" stroke-width="2"/>
    <line x1="5" y1="7" x2="9" y2="13" stroke="#212121" stroke-width="2"/>
    <line x1="-5" y1="7" x2="-9" y2="13" stroke="#212121" stroke-width="2"/>
  </g>
  <!-- Trail behind ball -->
  <path d="M 158 65 Q 130 80 90 110" stroke="#fff" stroke-width="3" fill="none" opacity="0.5" stroke-dasharray="3 3"/>
  <!-- Rocket car -->
  <g transform="translate(70 130)">
    <!-- Boost flame -->
    <path d="M -20 0 L -50 -5 L -45 0 L -55 5 L -45 8 L -50 12 L -20 8 Z" fill="url(#rl-flame)"/>
    <path d="M -22 2 L -42 0 L -42 8 L -22 6 Z" fill="#fff" opacity="0.7"/>
    <!-- Car body -->
    <rect x="-20" y="-2" width="50" height="14" rx="3" fill="#e53935" stroke="#212121" stroke-width="2"/>
    <!-- Cabin -->
    <polygon points="-8,-2 -4,-12 16,-12 22,-2" fill="#1565c0" stroke="#212121" stroke-width="1.5"/>
    <!-- Wheels -->
    <circle cx="-10" cy="14" r="6" fill="#212121"/>
    <circle cx="-10" cy="14" r="3" fill="#9e9e9e"/>
    <circle cx="22" cy="14" r="6" fill="#212121"/>
    <circle cx="22" cy="14" r="3" fill="#9e9e9e"/>
  </g>
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" fill="#ffeb3b" font-family="Arial Black" font-size="16" font-weight="900" stroke="#0d47a1" stroke-width="0.8">ROCKET LEAGUE</text>
</svg>
