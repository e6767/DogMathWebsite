<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="300" height="300" fill="url(#bg)"/>
  <!-- Action burst lines -->
  <line x1="150" y1="150" x2="30" y2="50" stroke="#ff4444" stroke-width="1.5" opacity="0.3"/>
  <line x1="150" y1="150" x2="270" y2="50" stroke="#ff4444" stroke-width="1.5" opacity="0.3"/>
  <line x1="150" y1="150" x2="270" y2="250" stroke="#ff4444" stroke-width="1.5" opacity="0.3"/>
  <line x1="150" y1="150" x2="30" y2="250" stroke="#ff4444" stroke-width="1.5" opacity="0.3"/>
  <line x1="150" y1="150" x2="150" y2="20" stroke="#ff4444" stroke-width="2" opacity="0.3"/>
  <line x1="150" y1="150" x2="20" y2="150" stroke="#ff4444" stroke-width="2" opacity="0.3"/>
  <line x1="150" y1="150" x2="280" y2="150" stroke="#ff4444" stroke-width="2" opacity="0.3"/>
  <!-- Stickman fighting pose -->
  <g filter="url(#glow)" stroke="#ffffff" stroke-linecap="round">
    <!-- Head -->
    <circle cx="150" cy="80" r="22" fill="none" stroke-width="4"/>
    <!-- Body -->
    <line x1="150" y1="102" x2="150" y2="175" stroke-width="4"/>
    <!-- Left arm raised (punch) -->
    <line x1="150" y1="120" x2="100" y2="95" stroke-width="4"/>
    <line x1="100" y1="95" x2="70" y2="100" stroke-width="4"/>
    <!-- Right arm back -->
    <line x1="150" y1="120" x2="195" y2="140" stroke-width="4"/>
    <line x1="195" y1="140" x2="220" y2="130" stroke-width="4"/>
    <!-- Left leg forward -->
    <line x1="150" y1="175" x2="115" y2="230" stroke-width="4"/>
    <line x1="115" y1="230" x2="90" y2="245" stroke-width="4"/>
    <!-- Right leg back -->
    <line x1="150" y1="175" x2="185" y2="235" stroke-width="4"/>
    <line x1="185" y1="235" x2="210" y2="245" stroke-width="4"/>
  </g>
  <!-- Fist impact -->
  <circle cx="67" cy="100" r="12" fill="#ff4444" opacity="0.8"/>
  <text x="57" y="105" font-size="14" fill="white" font-weight="bold">POW</text>
  <!-- Label -->
  <text x="150" y="278" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#fff" text-anchor="middle" filter="url(#glow)">STICKMAN</text>
</svg>